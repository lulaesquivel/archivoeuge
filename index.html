<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivo</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #FAFAF8;
    --ink: #1A1A18;
    --gray-light: #E8E8E4;
    --gray-mid: #AEAEA8;
    --gray-dim: #6B6B66;
    --accent: #C8A882;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--white); color: var(--ink);
    font-family: var(--font-body); font-weight: 300;
    min-height: 100vh;
  }

  /* ── MOBILE wrapper ── */
  #app-shell {
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ── DESKTOP layout ── */
  @media (min-width: 768px) {
    body { background: var(--white); }

    #app-shell {
      max-width: 100%;
      flex-direction: row;
      min-height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: 220px;
      min-width: 220px;
      border-right: 1px solid var(--gray-light);
      display: flex;
      flex-direction: column;
      padding: 36px 24px 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    #sidebar .logo { font-size: 24px; margin-bottom: 32px; display: block; }

    #sidebar-filters { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .sidebar-pill {
      font-family: var(--font-body); font-size: 11px; font-weight: 300;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 12px;
      border: none; background: transparent; color: var(--gray-dim);
      cursor: pointer; transition: all 0.15s ease; text-align: left;
    }
    .sidebar-pill.active { background: var(--ink); color: var(--white); }
    .sidebar-pill:hover:not(.active) { color: var(--ink); }

    .sidebar-section-label {
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gray-light); margin: 20px 0 8px 12px;
    }

    /* Sidebar nav buttons */
    #sidebar-nav { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
    .sidebar-nav-btn {
      font-family: var(--font-body); font-size: 11px; font-weight: 300;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 12px;
      border: none; background: transparent; color: var(--gray-dim);
      cursor: pointer; transition: all 0.15s ease; text-align: left;
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-nav-btn svg { width: 14px; height: 14px; stroke-width: 1.5; }
    .sidebar-nav-btn.active { color: var(--ink); font-weight: 400; }
    .sidebar-nav-btn:hover:not(.active) { color: var(--ink); }

    /* Add button in sidebar */
    #sidebar-add-btn {
      margin-top: auto;
      padding: 12px;
      background: var(--ink); color: var(--white);
      border: none; cursor: pointer;
      font-family: var(--font-body); font-size: 11px; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: opacity 0.15s;
    }
    #sidebar-add-btn:hover { opacity: 0.75; }

    /* Main content area */
    #main-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Hide mobile-only elements */
    nav { display: none !important; }
    #filters-section { display: none !important; }
    header { padding: 32px 32px 0; }

    /* Grid — more columns on desktop */
    .grid-wrap {
      padding: 16px 24px 40px;
      columns: 3;
    }

    .project-detail-grid {
      padding: 16px 24px;
      columns: 3;
    }

    /* Wider projects view */
    .projects-view { padding: 32px 32px 40px; }
    .project-detail-view { padding-bottom: 40px; }
    .project-detail-topbar { padding: 28px 32px 0; }
    .project-detail-name { padding: 8px 32px 0; }

    /* Panels full-screen centered on desktop */
    .panel {
      max-width: 520px;
      border-left: 1px solid var(--gray-light);
      border-right: 1px solid var(--gray-light);
    }

    .detail-panel {
      max-width: 600px;
      border-left: 1px solid var(--gray-light);
      border-right: 1px solid var(--gray-light);
    }

    @media (min-width: 1200px) {
      #sidebar { width: 260px; min-width: 260px; }
      .grid-wrap { columns: 4; }
      .project-detail-grid { columns: 4; }
    }
  }

  /* Loading screen */
  #loading-screen {
    position: fixed; inset: 0; background: var(--white);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
  }
  .loading-logo { font-family: var(--font-display); font-size: 32px; font-weight: 300; letter-spacing: 0.12em; }
  .loading-logo span { color: var(--accent); }
  .loading-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--gray-light);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* Offline banner */
  #offline-banner {
    display: none; background: var(--ink); color: var(--white);
    text-align: center; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 6px;
  }

  header { padding: 28px 20px 0; display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: var(--font-display); font-size: 28px; font-weight: 300; letter-spacing: 0.12em; }
  .logo span { color: var(--accent); }
  .header-count { font-size: 11px; color: var(--gray-mid); letter-spacing: 0.08em; text-transform: uppercase; padding-bottom: 4px; }

  .filters-wrap { padding: 18px 20px 0; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
  .filters-wrap::-webkit-scrollbar { display: none; }
  .filters { display: flex; gap: 6px; width: max-content; }
  .filter-pill {
    font-family: var(--font-body); font-size: 11px; font-weight: 300;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 14px;
    border: 1px solid var(--gray-light); background: transparent; color: var(--gray-dim);
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
  }
  .filter-pill.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

  .grid-wrap { padding: 16px 12px 90px; columns: 2; column-gap: 8px; }

  .card { break-inside: avoid; margin-bottom: 8px; position: relative; overflow: hidden; cursor: pointer; }
  .card img { width: 100%; display: block; }
  .card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(26,26,24,0.78) 0%, transparent 100%);
    padding: 24px 10px 10px; opacity: 0; transition: opacity 0.2s ease;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card-title { font-size: 11px; font-weight: 300; color: var(--white); letter-spacing: 0.04em; line-height: 1.3; }
  .card-cat { font-size: 9px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
  .card-project-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.7); }

  .card-link {
    background: var(--white); border: 1px solid var(--gray-light);
    padding: 16px 14px; min-height: 120px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: border-color 0.15s;
  }
  .card-link:hover { border-color: var(--ink); }
  .card-link-domain { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-mid); display: flex; align-items: center; gap: 5px; }
  .card-link-domain svg { width: 10px; height: 10px; stroke: var(--gray-mid); stroke-width: 1.5; flex-shrink: 0; }
  .card-link-title { font-family: var(--font-display); font-size: 16px; font-weight: 300; letter-spacing: 0.02em; color: var(--ink); line-height: 1.3; margin-top: 8px; flex: 1; }
  .card-link-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .card-link-cat { font-size: 9px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
  .card-link-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Panels */
  .panel {
    position: fixed; inset: 0; background: var(--white); z-index: 100;
    display: flex; flex-direction: column; max-width: 430px; margin: 0 auto;
    left: 50%; transform: translateX(-50%) translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0, 0.18, 1);
  }
  .panel.open { transform: translateX(-50%) translateY(0); }
  .panel-header { padding: 28px 20px 20px; border-bottom: 1px solid var(--gray-light); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .panel-title { font-family: var(--font-display); font-size: 22px; font-weight: 300; letter-spacing: 0.08em; }
  .panel-close { background: none; border: none; cursor: pointer; color: var(--gray-mid); font-size: 20px; line-height: 1; padding: 4px; }
  .panel-body { flex: 1; overflow-y: auto; padding: 24px 20px; }

  .field { margin-bottom: 24px; }
  .field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 8px; }
  .field input, .field textarea, .field select {
    width: 100%; background: none; border: none; border-bottom: 1px solid var(--gray-light);
    padding: 8px 0; font-family: var(--font-body); font-size: 14px; font-weight: 300; color: var(--ink);
    outline: none; transition: border-color 0.15s; -webkit-appearance: none; border-radius: 0;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ink); }
  .field textarea { resize: none; height: 60px; }

  .img-upload {
    border: 1px dashed var(--gray-light); padding: 32px; text-align: center; cursor: pointer;
    transition: border-color 0.15s; min-height: 100px; display: flex; align-items: center; justify-content: center;
  }
  .img-upload:hover { border-color: var(--gray-mid); }
  .img-upload-text { font-size: 12px; color: var(--gray-mid); letter-spacing: 0.04em; }
  .img-preview { width: 100%; max-height: 200px; object-fit: cover; display: none; }

  .btn-save {
    width: calc(100% - 40px); margin: 0 20px 32px; padding: 16px;
    background: var(--ink); color: var(--white); border: none;
    font-family: var(--font-body); font-size: 11px; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .btn-save:hover { opacity: 0.75; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  .project-chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .project-chip {
    font-size: 11px; font-weight: 300; letter-spacing: 0.04em; padding: 5px 12px;
    border: 1px solid var(--gray-light); background: transparent; color: var(--gray-dim);
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; font-family: var(--font-body);
  }
  .project-chip.selected { border-color: var(--ink); color: var(--ink); }
  .project-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
  .color-swatch.selected { border-color: var(--ink); }

  /* Detail */
  .detail-panel {
    position: fixed; inset: 0; background: var(--white); z-index: 200;
    display: flex; flex-direction: column; max-width: 430px; margin: 0 auto;
    left: 50%; transform: translateX(-50%) translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0, 0.18, 1); overflow-y: auto;
  }
  .detail-panel.open { transform: translateX(-50%) translateY(0); }
  .detail-img { width: 100%; display: block; max-height: 65vw; object-fit: cover; }
  .detail-body { padding: 20px; flex: 1; }
  .detail-cat { font-size: 10px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .detail-title { font-family: var(--font-display); font-size: 26px; font-weight: 300; letter-spacing: 0.04em; margin-bottom: 8px; }
  .detail-project-row { display: none; align-items: center; gap: 6px; margin-bottom: 10px; }
  .detail-project-dot { width: 8px; height: 8px; border-radius: 50%; }
  .detail-project-name { font-size: 11px; color: var(--gray-dim); letter-spacing: 0.06em; }
  .detail-tags { font-size: 11px; color: var(--gray-dim); letter-spacing: 0.04em; margin-bottom: 16px; }
  .detail-link-btn { display: none; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-dim); text-decoration: none; border-bottom: 1px solid var(--gray-light); padding-bottom: 2px; margin-bottom: 16px; width: fit-content; }
  .detail-note { font-size: 13px; font-weight: 300; color: var(--gray-dim); line-height: 1.6; border-top: 1px solid var(--gray-light); padding-top: 16px; margin-top: 8px; }
  .detail-top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 0; flex-shrink: 0; }
  .detail-back, .detail-delete { background: none; border: none; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-mid); cursor: pointer; font-family: var(--font-body); }

  /* Projects */
  .projects-view { display: none; padding: 28px 20px 90px; }
  .projects-view.visible { display: block; }
  .projects-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
  .projects-title { font-family: var(--font-display); font-size: 26px; font-weight: 300; letter-spacing: 0.08em; }
  .btn-new-project { background: none; border: none; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-mid); cursor: pointer; transition: color 0.15s; }
  .btn-new-project:hover { color: var(--ink); }

  .project-row { border: 1px solid var(--gray-light); padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: border-color 0.15s; }
  .project-row:hover { border-color: var(--ink); }
  .project-row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .project-row-info { flex: 1; }
  .project-row-name { font-size: 14px; font-weight: 300; letter-spacing: 0.02em; }
  .project-row-meta { font-size: 11px; color: var(--gray-mid); margin-top: 2px; letter-spacing: 0.04em; }
  .project-row-count { font-size: 11px; color: var(--gray-mid); letter-spacing: 0.04em; }

  .projects-empty { border: 1px dashed var(--gray-light); padding: 32px; text-align: center; }
  .projects-empty-text { font-size: 13px; color: var(--gray-mid); font-weight: 300; }

  /* Project detail */
  .project-detail-view { display: none; padding-bottom: 90px; }
  .project-detail-view.visible { display: block; }
  .project-detail-topbar { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .project-back-btn { background: none; border: none; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-mid); cursor: pointer; font-family: var(--font-body); }
  .btn-delete-project { background: none; border: none; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-mid); cursor: pointer; }
  .btn-delete-project:hover { color: #b00; }
  .project-detail-name { padding: 8px 20px 0; font-family: var(--font-display); font-size: 24px; font-weight: 300; letter-spacing: 0.06em; display: flex; align-items: center; gap: 10px; }
  .project-detail-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .project-detail-grid { padding: 16px 12px; columns: 2; column-gap: 8px; }

  /* Nav */
  nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--white); border-top: 1px solid var(--gray-light); display: flex; align-items: center; justify-content: space-around; padding: 12px 0 20px; z-index: 50; }
  .nav-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray-mid); transition: color 0.15s; }
  .nav-btn.active { color: var(--ink); }
  .nav-btn svg { width: 20px; height: 20px; stroke-width: 1.5; }
  .nav-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .nav-add { width: 44px; height: 44px; background: var(--ink); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--white); transition: opacity 0.15s; }
  .nav-add:hover { opacity: 0.75; }
  .nav-add svg { width: 20px; height: 20px; stroke-width: 1.5; }

  .empty { padding: 60px 20px; text-align: center; }
  .empty-text { font-size: 13px; color: var(--gray-mid); font-weight: 300; letter-spacing: 0.04em; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--white); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 20px; opacity: 0; transition: all 0.2s ease; pointer-events: none; z-index: 300; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .syncing { font-size: 10px; color: var(--gray-mid); letter-spacing: 0.06em; animation: pulse 1s infinite; }

  .detail-edit-btn {
    background: none; border: none;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gray-mid); cursor: pointer; font-family: var(--font-body);
    transition: color 0.15s;
  }
  .detail-edit-btn:hover { color: var(--ink); }
  .detail-edit-btn.active { color: var(--ink); font-weight: 400; }
</style>
</head>
<body>

<div id="app-shell">

<!-- SIDEBAR (desktop only) -->
<aside id="sidebar" style="display:none">
  <div class="logo">archiv<span>o</span></div>

  <div id="sidebar-nav">
    <button class="sidebar-nav-btn active" id="snav-home" onclick="showView('home')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9.75L12 3l9 6.75V21a.75.75 0 01-.75.75H3.75A.75.75 0 013 21V9.75z"/></svg>
      Inicio
    </button>
    <button class="sidebar-nav-btn" id="snav-projects" onclick="showView('projects')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
      Proyectos
    </button>
  </div>

  <div class="sidebar-section-label">Categorías</div>
  <div id="sidebar-filters">
    <button class="sidebar-pill active" data-scat="todos" onclick="sidebarFilter(event,'todos')">Todos</button>
    <button class="sidebar-pill" data-scat="Proveedor" onclick="sidebarFilter(event,'Proveedor')">Proveedor</button>
    <button class="sidebar-pill" data-scat="Referencia" onclick="sidebarFilter(event,'Referencia')">Referencia</button>
    <button class="sidebar-pill" data-scat="Material" onclick="sidebarFilter(event,'Material')">Material</button>
    <button class="sidebar-pill" data-scat="Estilo" onclick="sidebarFilter(event,'Estilo')">Estilo</button>
    <button class="sidebar-pill" data-scat="Detalle" onclick="sidebarFilter(event,'Detalle')">Detalle</button>
    <button class="sidebar-pill" data-scat="Otro" onclick="sidebarFilter(event,'Otro')">Otro</button>
  </div>

  <button id="sidebar-add-btn" onclick="openAddPanel()">+ Nueva pieza</button>
</aside>

<!-- MAIN CONTENT -->
<div id="main-content">

<div id="loading-screen">
  <div class="loading-logo">archiv<span>o</span></div>
  <div class="loading-dot"></div>
</div>

<div id="offline-banner">Sin conexión · los cambios se guardarán cuando vuelva internet</div>

<header>
  <div class="logo">archiv<span>o</span></div>
  <div class="header-count" id="item-count">—</div>
</header>

<div class="filters-wrap" id="filters-section">
  <div class="filters">
    <button class="filter-pill active" data-cat="todos" onclick="filterBy(event,'todos')">Todos</button>
    <button class="filter-pill" data-cat="Proveedor" onclick="filterBy(event,'Proveedor')">Proveedor</button>
    <button class="filter-pill" data-cat="Referencia" onclick="filterBy(event,'Referencia')">Referencia</button>
    <button class="filter-pill" data-cat="Material" onclick="filterBy(event,'Material')">Material</button>
    <button class="filter-pill" data-cat="Estilo" onclick="filterBy(event,'Estilo')">Estilo</button>
    <button class="filter-pill" data-cat="Detalle" onclick="filterBy(event,'Detalle')">Detalle</button>
    <button class="filter-pill" data-cat="Otro" onclick="filterBy(event,'Otro')">Otro</button>
  </div>
</div>

<div class="grid-wrap" id="grid"></div>

<div class="projects-view" id="projects-view">
  <div class="projects-header">
    <div class="projects-title">Proyectos</div>
    <button class="btn-new-project" onclick="openNewProjectPanel()">+ Nuevo</button>
  </div>
  <div id="projects-list"></div>
</div>

<div class="project-detail-view" id="project-detail-view">
  <div class="project-detail-topbar">
    <button class="project-back-btn" onclick="showView('projects')">← Proyectos</button>
    <button class="btn-delete-project" onclick="deleteCurrentProject()">Eliminar</button>
  </div>
  <div class="project-detail-name" id="project-detail-name"></div>
  <div class="filters-wrap" style="padding-top:16px;">
    <div class="filters">
      <button class="filter-pill active" data-pcat="todos" onclick="filterProjectBy(event,'todos')">Todos</button>

<script>
  // ── SUPABASE CONFIG ──
  // Reemplazá estos valores con los tuyos de supabase.com → Project Settings → API
const SUPABASE_URL  = 'https://clkayyduewmuzvazxmwm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsa2F5eWR1ZXdtdXp2YXp4bXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzE0NjksImV4cCI6MjA5MjU0NzQ2OX0.uzyR73i5udw_Z8iqSrFpyVcyUnic-N9Vlfqh2xac1EA';
  const STORAGE_BUCKET  = 'archivo-images';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── STATE ──
  const PROJECT_COLORS = ['#C8A882','#A8B8C8','#B8C8A8','#C8B8A8','#A8A8C8','#C8C8A8','#D4B8A8','#B8D4C8','#C8C8B8','#B8A8C8'];

  let items             = [];
  let projects          = [];
  let currentFilter     = 'todos';
  let currentProjFilter = 'todos';
  let currentView       = 'home';
  let currentDetailId   = null;
  let currentProjectId  = null;
  let selectedProjectId = '';
  let selectedColor     = PROJECT_COLORS[0];
  let pendingFile       = null;
  let isOnline          = navigator.onLine;


  // ── DESKTOP SIDEBAR ──
  function isDesktop() { return window.innerWidth >= 768; }

  function initSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (isDesktop()) {
      sidebar.style.display = 'flex';
      // Hide mobile header on desktop since sidebar has the logo
      document.querySelector('header').style.display = 'none';
    } else {
      sidebar.style.display = 'none';
      document.querySelector('header').style.display = '';
    }
  }

  window.addEventListener('resize', initSidebar);
  initSidebar();

  function sidebarFilter(e, cat) {
    currentFilter = cat;
    document.querySelectorAll('[data-scat]').forEach(p => p.classList.remove('active'));
    e.target.classList.add('active');
    // also sync mobile pills
    document.querySelectorAll('[data-cat]').forEach(p => p.classList.remove('active'));
    const mobileEl = document.querySelector(`[data-cat="${cat}"]`);
    if (mobileEl) mobileEl.classList.add('active');
    if (currentView !== 'home') showView('home');
    else renderGrid();
  }

  function syncSidebarNav(view) {
    document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));
    if (view === 'home') document.getElementById('snav-home')?.classList.add('active');
    if (view === 'projects') document.getElementById('snav-projects')?.classList.add('active');
    // hide category filters when not on home
    document.getElementById('sidebar-filters').style.opacity = view === 'home' ? '1' : '0.3';
    document.getElementById('sidebar-filters').style.pointerEvents = view === 'home' ? '' : 'none';
  }

  // ── OFFLINE DETECTION ──
  window.addEventListener('online',  () => { isOnline = true;  document.getElementById('offline-banner').style.display = 'none';  loadAll(); });
  window.addEventListener('offline', () => { isOnline = false; document.getElementById('offline-banner').style.display = 'block'; });

  // ── INIT ──
  async function loadAll() {
    try {
      const [{ data: dbItems }, { data: dbProjects }] = await Promise.all([
        sb.from('items').select('*').order('created_at', { ascending: false }),
        sb.from('projects').select('*').order('created_at', { ascending: true }),
      ]);
      items    = dbItems    || [];
      projects = dbProjects || [];
    } catch (e) {
      console.error('Error cargando datos:', e);
    }
    document.getElementById('loading-screen').style.display = 'none';
    renderGrid();
  }

  loadAll();

  // ── REALTIME (sincronización automática) ──
  sb.channel('archivo')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'items' },    () => loadAll())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, () => loadAll())
    .subscribe();

  // ── HELPERS ──
  function getDomain(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return url; } }
  function isImageUrl(url) { return /\.(jpg|jpeg|png|gif|webp|avif|svg)(\?.*)?$/i.test(url) || url.startsWith('data:image'); }
  function getProject(id) { return projects.find(p => p.id === id); }

  function cardHTML(item) {
    const proj = item.project_id ? getProject(item.project_id) : null;
    if (item.type === 'link') {
      return `<div class="card card-link" onclick="openDetail('${item.id}')">
        <div class="card-link-domain">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
          ${getDomain(item.url)}
        </div>
        <div class="card-link-title">${item.title}</div>
        <div class="card-link-footer">
          <div class="card-link-cat">${item.category}</div>
          ${proj ? `<div class="card-link-dot" style="background:${proj.color}" title="${proj.name}"></div>` : ''}
        </div>
      </div>`;
    }
    return `<div class="card" onclick="openDetail('${item.id}')">
      <img src="${item.image_url}" alt="${item.title}" loading="lazy" onerror="this.style.minHeight='120px';this.style.background='#E8E8E4'">
      ${proj ? `<div class="card-project-dot" style="background:${proj.color}" title="${proj.name}"></div>` : ''}
      <div class="card-overlay">
        <div class="card-title">${item.title}</div>
        <div class="card-cat">${item.category}</div>
      </div>
    </div>`;
  }

  // ── VIEWS ──
  function showView(view) {
    currentView = view;
    document.getElementById('grid').style.display = 'none';
    document.getElementById('filters-section').style.display = 'none';
    document.getElementById('projects-view').classList.remove('visible');
    document.getElementById('project-detail-view').classList.remove('visible');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    syncSidebarNav(view);
    if (view === 'home') {
      document.getElementById('grid').style.display = '';
      document.getElementById('filters-section').style.display = '';
      document.getElementById('nav-home').classList.add('active');
      renderGrid();
    } else if (view === 'projects') {
      document.getElementById('projects-view').classList.add('visible');
      document.getElementById('nav-projects').classList.add('active');
      renderProjects();
    }
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = currentFilter === 'todos' ? items : items.filter(i => i.category === currentFilter);
    document.getElementById('item-count').textContent = filtered.length + (filtered.length === 1 ? ' pieza' : ' piezas');
    grid.innerHTML = filtered.length
      ? filtered.map(cardHTML).join('')
      : '<div class="empty"><p class="empty-text">Todavía no hay piezas aquí</p></div>';
  }

  function filterBy(e, cat) {
    currentFilter = cat;
    document.querySelectorAll('[data-cat]').forEach(p => p.classList.remove('active'));
    e.target.classList.add('active');
    renderGrid();
  }

  // ── PROJECTS ──
  function renderProjects() {
    const list = document.getElementById('projects-list');
    if (!projects.length) {
      list.innerHTML = `<div class="projects-empty"><p class="projects-empty-text">Todavía no tenés proyectos · tocá + Nuevo</p></div>`;
      return;
    }
    list.innerHTML = projects.map(p => {
      const count = items.filter(i => i.project_id === p.id).length;
      return `<div class="project-row" onclick="openProjectDetail('${p.id}')">
        <div class="project-row-dot" style="background:${p.color}"></div>
        <div class="project-row-info">
          <div class="project-row-name">${p.name}</div>
          ${p.client ? `<div class="project-row-meta">${p.client}</div>` : ''}
        </div>
        <div class="project-row-count">${count}</div>
      </div>`;
    }).join('');
  }

  function openProjectDetail(pid) {
    currentProjectId  = pid;
    currentProjFilter = 'todos';
    const proj = getProject(pid);
    if (!proj) return;

    document.getElementById('project-detail-name').innerHTML =
      `<div class="project-detail-dot" style="background:${proj.color}"></div>${proj.name}`;
    document.querySelectorAll('[data-pcat]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-pcat="todos"]').classList.add('active');
    document.getElementById('projects-view').classList.remove('visible');
    document.getElementById('project-detail-view').classList.add('visible');
    document.getElementById('nav-projects').classList.add('active');
    renderProjectDetailGrid();
  }

  function renderProjectDetailGrid() {
    const grid = document.getElementById('project-detail-grid');
    let filtered = items.filter(i => i.project_id === currentProjectId);
    if (currentProjFilter !== 'todos') filtered = filtered.filter(i => i.category === currentProjFilter);
    grid.innerHTML = filtered.length
      ? filtered.map(cardHTML).join('')
      : '<div class="empty"><p class="empty-text">Sin piezas en este proyecto todavía</p></div>';
  }

  function filterProjectBy(e, cat) {
    currentProjFilter = cat;
    document.querySelectorAll('[data-pcat]').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderProjectDetailGrid();
  }

  async function deleteCurrentProject() {
    const proj = getProject(currentProjectId);
    if (!proj || !confirm(`¿Eliminar "${proj.name}"? Las piezas quedarán sin proyecto.`)) return;
    await sb.from('items').update({ project_id: null }).eq('project_id', currentProjectId);
    await sb.from('projects').delete().eq('id', currentProjectId);
    showView('projects');
    showToast('Proyecto eliminado');
  }

  function openNewProjectPanel() {
    document.getElementById('project-name-input').value   = '';
    document.getElementById('project-client-input').value = '';
    selectedColor = PROJECT_COLORS[0];
    renderColorPicker();
    document.getElementById('new-project-panel').classList.add('open');
  }
  function closeNewProjectPanel() { document.getElementById('new-project-panel').classList.remove('open'); }

  function renderColorPicker() {
    document.getElementById('color-picker').innerHTML = PROJECT_COLORS.map(c =>
      `<div class="color-swatch ${c===selectedColor?'selected':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`
    ).join('');
  }
  function pickColor(el, c) {
    selectedColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function saveProject() {
    const name = document.getElementById('project-name-input').value.trim();
    if (!name) { showToast('Poné un nombre'); return; }
    const client = document.getElementById('project-client-input').value.trim();
    const { error } = await sb.from('projects').insert({ name, client, color: selectedColor });
    if (error) { showToast('Error al guardar'); return; }
    closeNewProjectPanel();
    showToast('Proyecto creado');
  }

  // ── ADD ITEM ──
  function openAddPanel() {
    pendingFile       = null;
    selectedProjectId = document.getElementById('project-detail-view').classList.contains('visible') ? (currentProjectId || '') : '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-preview').src           = '';
    document.getElementById('upload-text').style.display = 'flex';
    ['url-input','title-input','tags-input','note-input'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('file-input').value = '';
    renderProjectChips();
    document.getElementById('add-panel').classList.add('open');
  }
  function closeAddPanel() { document.getElementById('add-panel').classList.remove('open'); }

  function renderProjectChips() {
    const wrap = document.getElementById('project-chips');
    const chips = [`<button class="project-chip ${selectedProjectId===''?'selected':''}" onclick="selectProject(this,'')"><em style="font-style:italic;font-size:11px">Sin proyecto</em></button>`];
    projects.forEach(p => {
      chips.push(`<button class="project-chip ${selectedProjectId===p.id?'selected':''}" onclick="selectProject(this,'${p.id}')">
        <div class="project-chip-dot" style="background:${p.color}"></div>${p.name}
      </button>`);
    });
    wrap.innerHTML = chips.join('');
  }

  function selectProject(el, pid) {
    selectedProjectId = pid;
    document.querySelectorAll('.project-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }

  function handleFile(input) {
    const file = input.files[0]; if (!file) return;
    loadImageFile(file);
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('upload-zone').style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImageFile(file);
  }

  function loadImageFile(file) {
    pendingFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('img-preview').src           = e.target.result;
      document.getElementById('img-preview').style.display = 'block';
      document.getElementById('upload-text').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // Paste anywhere in the page when the add panel is open
  document.addEventListener('paste', e => {
    if (!document.getElementById('add-panel').classList.contains('open')) return;
    const items = e.clipboardData.items;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        loadImageFile(item.getAsFile());
        showToast('Imagen pegada');
        return;
      }
    }
  });

  async function saveItem() {
    const title = document.getElementById('title-input').value.trim();
    if (!title) { showToast('Agregá un título'); return; }

    const urlVal   = document.getElementById('url-input').value.trim();
    const category = document.getElementById('cat-input').value;
    const tags     = document.getElementById('tags-input').value.split(',').map(t=>t.trim()).filter(Boolean);
    const note     = document.getElementById('note-input').value.trim();

    const btn = document.getElementById('save-item-btn');
    btn.disabled     = true;
    btn.textContent  = 'Guardando...';

    let newItem = {
      title, category,
      project_id: selectedProjectId || null,
      tags, note, type: 'image'
    };

    try {
      if (pendingFile) {
        // Upload image to Supabase Storage
        const ext      = pendingFile.name.split('.').pop();
        const filename = `${Date.now()}.${ext}`;
        const { error: upErr } = await sb.storage.from(STORAGE_BUCKET).upload(filename, pendingFile, { contentType: pendingFile.type });
        if (upErr) throw upErr;
        const { data: { publicUrl } } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(filename);
        newItem.image_url = publicUrl;
      } else if (urlVal && isImageUrl(urlVal)) {
        newItem.image_url = urlVal;
        newItem.type      = 'image';
      } else if (urlVal) {
        newItem.type = 'link';
        newItem.url  = urlVal;
        delete newItem.image_url;
      } else {
        showToast('Agregá una imagen o URL');
        btn.disabled = false; btn.textContent = 'Guardar pieza';
        return;
      }

      const { error } = await sb.from('items').insert(newItem);
      if (error) throw error;

      closeAddPanel();
      if (document.getElementById('project-detail-view').classList.contains('visible')) {
        renderProjectDetailGrid();
      } else {
        showView('home');
      }
      showToast('Pieza guardada');
    } catch (e) {
      console.error(e);
      showToast('Error al guardar');
    }

    btn.disabled    = false;
    btn.textContent = 'Guardar pieza';
  }

  // ── DETAIL ──
  function openDetail(id) {
    const item = items.find(i => i.id === id); if (!item) return;
    currentDetailId = id;

    const detailImg  = document.getElementById('detail-img');
    const detailLink = document.getElementById('detail-link');

    if (item.type === 'link') {
      detailImg.style.display  = 'none';
      detailLink.href          = item.url;
      detailLink.textContent   = '↗ ' + getDomain(item.url);
      detailLink.style.display = 'inline-block';
    } else {
      detailImg.src            = item.image_url;
      detailImg.style.display  = 'block';
      detailLink.style.display = 'none';
    }

    document.getElementById('detail-cat').textContent   = item.category;
    document.getElementById('detail-title').textContent = item.title;
    document.getElementById('detail-tags').textContent  = item.tags?.length ? item.tags.join(' · ') : '';

    const proj    = item.project_id ? getProject(item.project_id) : null;
    const projRow = document.getElementById('detail-project-row');
    if (proj) {
      document.getElementById('detail-project-dot').style.background = proj.color;
      document.getElementById('detail-project-name-el').textContent  = proj.name;
      projRow.style.display = 'flex';
    } else { projRow.style.display = 'none'; }

    const noteEl = document.getElementById('detail-note');
    noteEl.textContent   = item.note || '';
    noteEl.style.display = item.note ? '' : 'none';

    document.getElementById('detail-panel').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    currentDetailId = null;
    // Reset edit mode
    if (isEditMode) {
      isEditMode = false;
      document.getElementById('detail-view-mode').style.display = 'block';
      document.getElementById('detail-edit-mode').style.display = 'none';
      document.getElementById('detail-save-btn').style.display  = 'none';
      document.getElementById('detail-edit-btn').textContent    = 'Editar';
      document.getElementById('detail-edit-btn').classList.remove('active');
    }
  }

  async function deleteCurrentItem() {
    if (!currentDetailId || !confirm('¿Eliminar esta pieza?')) return;
    await sb.from('items').delete().eq('id', currentDetailId);
    closeDetail();
    showToast('Pieza eliminada');
  }


  // ── EDIT ──
  let editPendingFile = null;
  let isEditMode = false;

  function toggleEdit() {
    isEditMode = !isEditMode;
    const item = items.find(i => i.id === currentDetailId);
    if (!item) return;

    document.getElementById('detail-view-mode').style.display = isEditMode ? 'none' : 'block';
    document.getElementById('detail-edit-mode').style.display = isEditMode ? 'block' : 'none';
    document.getElementById('detail-save-btn').style.display  = isEditMode ? 'block' : 'none';
    document.getElementById('detail-edit-btn').textContent    = isEditMode ? 'Cancelar' : 'Editar';
    document.getElementById('detail-edit-btn').classList.toggle('active', isEditMode);

    if (isEditMode) populateEditForm(item);
  }

  function populateEditForm(item) {
    editPendingFile = null;

    // Image preview
    const prev = document.getElementById('edit-img-preview');
    const txt  = document.getElementById('edit-upload-text');
    if (item.type === 'image' && item.image_url) {
      prev.src          = item.image_url;
      prev.style.display = 'block';
      txt.style.display  = 'none';
    } else {
      prev.src           = '';
      prev.style.display = 'none';
      txt.style.display  = 'flex';
    }

    document.getElementById('edit-url-input').value   = item.type === 'link' ? (item.url || '') : '';
    document.getElementById('edit-title-input').value = item.title || '';
    document.getElementById('edit-tags-input').value  = item.tags?.join(', ') || '';
    document.getElementById('edit-note-input').value  = item.note || '';

    // Category
    const catSel = document.getElementById('edit-cat-input');
    catSel.value = item.category;

    // Project chips
    const wrap = document.getElementById('edit-project-chips');
    const selPid = item.project_id || '';
    const chips = [`<button class="project-chip ${selPid===''?'selected':''}" onclick="selectEditProject(this,'')"><em style="font-style:italic;font-size:11px">Sin proyecto</em></button>`];
    projects.forEach(p => {
      chips.push(`<button class="project-chip ${selPid===p.id?'selected':''}" onclick="selectEditProject(this,'${p.id}')">
        <div class="project-chip-dot" style="background:${p.color}"></div>${p.name}
      </button>`);
    });
    wrap.innerHTML = chips.join('');
    wrap._selectedPid = selPid;
  }

  function selectEditProject(el, pid) {
    document.querySelectorAll('#edit-project-chips .project-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('edit-project-chips')._selectedPid = pid;
  }

  function handleEditFile(input) {
    const file = input.files[0]; if (!file) return;
    editPendingFile = file;
    showEditPreview(file);
  }

  function handleEditDrop(e) {
    e.preventDefault();
    document.getElementById('edit-upload-zone').style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) { editPendingFile = file; showEditPreview(file); }
  }

  function showEditPreview(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('edit-img-preview');
      prev.src           = e.target.result;
      prev.style.display = 'block';
      document.getElementById('edit-upload-text').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // Paste in edit mode
  document.addEventListener('paste', e => {
    if (!isEditMode) return;
    const clipItems = e.clipboardData.items;
    for (const ci of clipItems) {
      if (ci.type.startsWith('image/')) {
        e.preventDefault();
        editPendingFile = ci.getAsFile();
        showEditPreview(editPendingFile);
        showToast('Imagen pegada');
        return;
      }
    }
  });

  async function saveEdit() {
    const item = items.find(i => i.id === currentDetailId); if (!item) return;

    const title    = document.getElementById('edit-title-input').value.trim();
    if (!title) { showToast('El título no puede estar vacío'); return; }

    const urlVal   = document.getElementById('edit-url-input').value.trim();
    const category = document.getElementById('edit-cat-input').value;
    const tags     = document.getElementById('edit-tags-input').value.split(',').map(t=>t.trim()).filter(Boolean);
    const note     = document.getElementById('edit-note-input').value.trim();
    const projId   = document.getElementById('edit-project-chips')._selectedPid || null;

    const btn = document.getElementById('detail-save-btn');
    btn.disabled    = true;
    btn.textContent = 'Guardando...';

    let updates = { title, category, tags, note, project_id: projId || null };

    try {
      if (editPendingFile) {
        const ext      = editPendingFile.name.split('.').pop();
        const filename = `${Date.now()}.${ext}`;
        const { error: upErr } = await sb.storage.from(STORAGE_BUCKET).upload(filename, editPendingFile, { contentType: editPendingFile.type });
        if (upErr) throw upErr;
        const { data: { publicUrl } } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(filename);
        updates.image_url = publicUrl;
        updates.type      = 'image';
        updates.url       = null;
      } else if (urlVal && urlVal !== (item.url || '')) {
        if (isImageUrl(urlVal)) {
          updates.image_url = urlVal;
          updates.type      = 'image';
          updates.url       = null;
        } else {
          updates.type      = 'link';
          updates.url       = urlVal;
          updates.image_url = null;
        }
      }

      const { error } = await sb.from('items').update(updates).eq('id', currentDetailId);
      if (error) throw error;

      showToast('Cambios guardados');
      isEditMode = false;
      // UI will refresh via realtime subscription
    } catch (e) {
      console.error(e);
      showToast('Error al guardar');
    }

    btn.disabled    = false;
    btn.textContent = 'Guardar cambios';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</div><!-- /main-content -->
</div><!-- /app-shell -->
</body>
</html>
